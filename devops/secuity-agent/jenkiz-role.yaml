apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-role
  namespace: jenkins
rules:
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - create
      - delete
      - get
      - list
      - watch

  - apiGroups: [ "" ]
    resources: [ "pods/exec" ]
    verbs: [ "create" ]

  - apiGroups: [ "" ]
    resources: [ "pods/log" ]
    verbs: [ "get" ]
