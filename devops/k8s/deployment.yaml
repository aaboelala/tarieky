apiVersion: apps/v1
kind: Deployment
metadata:
  name: tarieky-app
  namespace: tarieky
  labels:
    app: tarieky
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tarieky
  template:
    metadata:
      labels:
        app: tarieky
    spec:
      containers:
        - name: web
          image: ghcr.io/aaboelala/tarieky:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: PORT
              value: "8000"
            - name: DEBUG
              value: "False"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: tarieky-secrets
                  key: secret-key
                  optional: true
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tarieky-secrets
                  key: database-url
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /admin/login/
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /admin/login/
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
